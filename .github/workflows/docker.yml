name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push finlake-spark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/finlake-spark" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }}:${{ github.sha }} \
            -t ${{ steps.meta.outputs.image }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.meta.outputs.image }}:latest