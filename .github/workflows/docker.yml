name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: finlake-spark
            context: spark
          - image: finlake-airflow
            context: airflow

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      # Each image is built with its OWN folder as the build context (not
      # repo root) — spark/Dockerfile only sees spark/, airflow/Dockerfile
      # only sees airflow/. That's the whole point of separating them:
      # neither image can accidentally COPY the other's files, and each
      # Dockerfile's COPY paths are self-contained relative to its folder.
      - name: Build image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }}:${{ github.sha }} \
            -t ${{ steps.meta.outputs.image }}:latest \
            ${{ matrix.context }}

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.meta.outputs.image }}:latest
