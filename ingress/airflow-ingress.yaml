apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airflow-ingress
  namespace: finlake
spec:
  ingressClassName: nginx

  rules:
  - host: airflow.4-147-239-228.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finlake-airflow
            port:
              number: 8080