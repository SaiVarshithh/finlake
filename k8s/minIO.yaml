# minio/minio-k8s.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: finlake
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: finlake-minio, namespace: finlake }
spec:
  replicas: 1
  selector: { matchLabels: { app: finlake-minio } }
  template:
    metadata: { labels: { app: finlake-minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: "minioadmin" }
            - { name: MINIO_ROOT_PASSWORD, value: "minioadmin" }
          ports: [{ containerPort: 9000 }, { containerPort: 9001 }]
          volumeMounts: [{ name: data, mountPath: /data }]
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: finlake-minio, namespace: finlake }
spec:
  selector: { app: finlake-minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001, nodePort: 30901 }
  type: NodePort