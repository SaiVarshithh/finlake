# nessie/nessie-k8s.yaml
apiVersion: apps/v1
kind: Deployment
metadata: { name: finlake-nessie, namespace: finlake }
spec:
  replicas: 1
  selector: { matchLabels: { app: finlake-nessie } }
  template:
    metadata: { labels: { app: finlake-nessie } }
    spec:
      containers:
        - name: nessie
          image: ghcr.io/projectnessie/nessie:0.80.0
          env:
            - { name: NESSIE_VERSION_STORE_TYPE, value: "JDBC" }
            - { name: NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE, value: "postgresql" }
            - { name: QUARKUS_DATASOURCE_JDBC_URL, value: "jdbc:postgresql://finlake-postgres:5432/nessie" }
            - { name: QUARKUS_DATASOURCE_USERNAME, value: "nessie" }
            - { name: QUARKUS_DATASOURCE_PASSWORD, value: "password" }
          ports: [{ containerPort: 19120 }]
---
apiVersion: v1
kind: Service
metadata: { name: finlake-nessie, namespace: finlake }
spec:
  selector: { app: finlake-nessie }
  ports: [{ port: 19120, targetPort: 19120, nodePort: 30120 }]
  type: NodePort